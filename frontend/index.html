<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Seguros · Comparador</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; }
</style>
</head>
<body class="flex items-center justify-center min-h-screen">
<div x-data="loginApp()" class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-md">

  <div class="text-center mb-8">
    <img src="https://rsfinanzas.com/wp-content/uploads/2023/08/Logo-RS-SEGUROS-Y-FINANZAS-ISOTIPO-COLOR.png"
         onerror="this.style.display='none'"
         class="h-16 mx-auto mb-4" alt="RS Seguros">
    <h1 class="text-2xl font-bold text-gray-800">RS Seguros & Finanzas</h1>
    <p class="text-gray-500 text-sm mt-1">Comparador de Coberturas</p>
  </div>

  <form @submit.prevent="login" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
      <input x-model="username" type="text" placeholder="rsseguros"
             class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
      <input x-model="password" type="password" placeholder="••••••••"
             class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div x-show="error" x-text="error" class="bg-red-50 text-red-600 text-sm px-4 py-2 rounded-lg"></div>

    <button type="submit" :disabled="loading"
            class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2.5 rounded-lg transition disabled:opacity-50">
      <span x-show="!loading">Ingresar</span>
      <span x-show="loading">Ingresando...</span>
    </button>
  </form>
</div>

<script>
function loginApp() {
  return {
    username: '',
    password: '',
    error: '',
    loading: false,
    async login() {
      this.loading = true;
      this.error = '';
      try {
        const r = await fetch('/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username: this.username, password: this.password})
        });
        const data = await r.json();
        if (!r.ok) { this.error = data.detail || 'Error al ingresar'; return; }
        localStorage.setItem('rs_token', data.token);
        window.location.href = '/dashboard';
      } catch(e) {
        this.error = 'Error de conexión';
      } finally {
        this.loading = false;
      }
    }
  }
}
</script>
</body>
</html>
